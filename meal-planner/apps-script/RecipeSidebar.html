<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; color: #202124; padding: 12px; margin: 0; }
    h3 { font-size: 14px; font-weight: 600; margin: 0 0 8px 0; }
    #controls { margin-bottom: 10px; }
    #controls a { color: #1a73e8; cursor: pointer; font-size: 12px; margin-right: 10px; }
    #recipe-list { border: 1px solid #dadce0; border-radius: 4px; max-height: calc(100vh - 155px); overflow-y: auto; margin-bottom: 10px; }
    .sheet-group { border-top: 1px solid #dadce0; }
    .sheet-group:first-child { border-top: none; }
    .sheet-label { padding: 7px 10px 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #5f6368; background: #f8f9fa; }
    .recipe-item { padding: 8px 10px; border-bottom: 1px solid #f1f3f4; display: flex; align-items: center; }
    .recipe-item:last-child { border-bottom: none; }
    .recipe-item input { margin-right: 8px; cursor: pointer; }
    .recipe-item label { cursor: pointer; }
    #add-btn { width: 100%; padding: 8px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; }
    #add-btn:hover:not(:disabled) { background: #1765cc; }
    #add-btn:disabled { background: #dadce0; color: #80868b; cursor: default; }
    #gemini-count { font-size: 11px; color: #5f6368; margin: -4px 0 10px 0; }
    #status { margin-top: 8px; font-size: 12px; min-height: 16px; word-wrap: break-word; }
    .msg { padding: 16px 10px; color: #5f6368; font-style: italic; text-align: center; }
  </style>
</head>
<body>

<h3>Select Recipes</h3>
<div id="gemini-count">Loading…</div>
<div id="controls">
  <a onclick="selectAll()">Select all</a>
  <a onclick="deselectAll()">Deselect all</a>
</div>
<div id="recipe-list"></div><button id="add-btn" onclick="addToList()" disabled>Add to Grocery List</button>
<div id="status"></div>

<script>
var RECIPES = <?!= recipesJson ?>;

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  if (!RECIPES || RECIPES.length === 0) {
    document.getElementById('recipe-list').innerHTML = '<div class="msg">No recipes found. Add recipe names to Row 1 of any sheet, then reopen this sidebar.</div>';
    return;
  }
  var html = '';
  var currentSheet = null;
  for (var i = 0; i < RECIPES.length; i++) {
    var r = RECIPES[i];
    if (r.sheetName !== currentSheet) {
      if (currentSheet !== null) html += '</div>';
      html += '<div class="sheet-group">';
      html += '<div class="sheet-label">' + escHtml(r.sheetName) + '</div>';
      currentSheet = r.sheetName;
    }
    var name = escHtml(r.name);
    var val = escHtml(r.sheetName) + '|' + r.colIndex;
    var cbId = 'cb_' + escHtml(r.sheetName) + '_' + r.colIndex;
    html += '<div class="recipe-item">';
    html += '<input type="checkbox" id="' + cbId + '" value="' + val + '" onchange="updateBtn()">';
    html += '<label for="' + cbId + '">' + name + '</label>';
    html += '</div>';
  }
  if (currentSheet !== null) html += '</div>';
  document.getElementById('recipe-list').innerHTML = html;
  updateBtn();
}

function selectAll() {
  var boxes = document.querySelectorAll('input[type="checkbox"]');
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = true;
  updateBtn();
}

function deselectAll() {
  var boxes = document.querySelectorAll('input[type="checkbox"]');
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = false;
  updateBtn();
}

function updateBtn() {
  var n = document.querySelectorAll('input[type="checkbox"]:checked').length;
  document.getElementById('add-btn').disabled = (n === 0);
}

function addToList() {
  var checked = document.querySelectorAll('input[type="checkbox"]:checked');
  if (checked.length === 0) return;
  var selections = [];
  for (var i = 0; i < checked.length; i++) {
    var pipeIdx = checked[i].value.indexOf('|');
    var sheetName = checked[i].value.substring(0, pipeIdx);
    var colIndex = parseInt(checked[i].value.substring(pipeIdx + 1), 10);
    selections.push({ sheetName: sheetName, colIndex: colIndex });
  }
  document.getElementById('add-btn').disabled = true;
  var statusEl = document.getElementById('status');
  statusEl.style.color = '#5f6368';
  statusEl.textContent = 'Adding ' + selections.length + ' recipe(s)...';
  google.script.run
    .withSuccessHandler(function(msg) {
      statusEl.textContent = msg;
      statusEl.style.color = '#137333';
      document.getElementById('add-btn').disabled = false;
      var countEl = document.getElementById('gemini-count');
      var m = countEl.textContent.match(/\d+/);
      if (m) updateGeminiCount(20 - Math.max(0, parseInt(m[0], 10) - 1));
    })
    .withFailureHandler(function(err) {
      statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      statusEl.style.color = '#d93025';
      document.getElementById('add-btn').disabled = false;
    })
    .pushSelectedRecipes(selections);
}

function updateGeminiCount(used) {
  var remaining = Math.max(0, 20 - used);
  document.getElementById('gemini-count').textContent =
    'You have ' + remaining + ' remaining exports today.';
}

google.script.run
  .withSuccessHandler(updateGeminiCount)
  .withFailureHandler(function() {
    document.getElementById('gemini-count').textContent = '';
  })
  .getGeminiCallCount();

init();
</script>
</body>
</html>
